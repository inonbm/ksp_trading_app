<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>בוט קניות KSP</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1>בוט קניות KSP</h1>
            <p>הגדר את החיפוש שלך והבוט יבצע את הרכישה עבורך באופן אוטומטי.</p>
        </header>

        <main>
            <section class="card search-section">
                <h2>הגדרות חיפוש</h2>
                <form id="tradeForm">
                    <div class="form-group">
                        <label for="query">שם המוצר</label>
                        <input type="text" id="query" name="query" placeholder="לדוגמה: iPhone 15" required>
                    </div>
                    <div class="form-group">
                        <label for="maxPrice">מחיר מקסימלי (₪)</label>
                        <input type="number" id="maxPrice" name="max_price" placeholder="לדוגמה: 4000" min="1" required>
                    </div>
                    <button type="submit" id="startBtn" class="btn-primary">
                        <span>התחל אוטומציה</span>
                    </button>
                </form>
            </section>

            <section class="card status-section hidden" id="statusSection">
                <h2>סטטוס ותהליכים</h2>
                <div id="loadingIndicator" class="loading-container">
                    <div class="spinner"></div>
                    <p id="loadingMessage">האוטומציה פועלת כעת ברקע...</p>
                </div>
                
                <div class="trace-container">
                    <ul id="traceList" class="trace-list">
                        <!-- שלבי המעקב יוצגו כאן -->
                    </ul>
                </div>
            </section>

            <section class="card results-section hidden" id="resultsSection">
                <h2>תוצאות וקופה</h2>
                <div class="success-message" id="successMessage">
                    <!-- הודעת הצלחה תוצג כאן -->
                </div>
                
                <div class="product-details" id="productDetails">
                    <h3 id="productTitle">שם המוצר</h3>
                    <p class="product-price">מחיר: <span id="productPrice">0</span> ₪</p>
                    <a href="#" id="productUrl" target="_blank" class="btn-secondary">צפה ב-KSP</a>
                </div>
            </section>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
